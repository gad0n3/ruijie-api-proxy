openapi: 3.0.3
info:
  title: ruijie-api-proxy
  version: 1.0.0
  description: |
    Express proxy API for Ruijie upstream services.

    Client contract guidance:
    - All API endpoints return a normalized envelope.
      - success: { success, message, data, meta }
      - error: { success, message, error: { httpStatus, details } }
    - `/docs` (Swagger UI assets) is not wrapped.
    - Endpoint-level payload examples represent the `data` field inside the success envelope.
    - Client is not required to provide `lang`; server applies default language internally.
    - If uplink returns `voucherData.code=1014` (Group has not been synchronized), proxy maps it to `409 USERGROUP_NOT_SYNCED`; client should reset selected group/package state and refresh group selection.
servers:
  - url: http://localhost:3000
x-uplink:
  baseUrlEnv:
    - UPSTREAM_BASE_URL
    - RUIJIE_UPSTREAM_BASE_URL
    - UPSTREAM_URL
  timeoutEnv: UPSTREAM_TIMEOUT_MS
  auth:
    loginHeaders:
      - appid
      - secret
    protectedHeader: Authorization: Bearer <access_token>
    protectedQueryToken: access_token
    compositeClientToken: Bearer <appid>::<access_token>
  routes:
    - proxy: POST /login
      uplink: POST /oauth20/client/access_token?token=<RUIJIE_LOGIN_TOKEN>
    - proxy: login tenant sync
      uplink: GET /org/tenant/info?access_token=
    - proxy: GET /network_group
      uplink: GET /group/single/tree?access_token=
    - proxy: GET /packages
      uplink: GET /intl/usergroup/list/{groupId}
    - proxy: POST /packages/create
      uplink: POST /intlSamProfile/create/{tenant}/{tenant}/{groupId} then POST /intl/usergroup/group/{groupId}
    - proxy: POST /packages/{groupId}
      uplink: POST /intlSamProfile/update/{tenant}/{tenant}/{groupId} then PUT /intl/usergroup/group/{groupId}
    - proxy: DELETE /packages/{uuid}
      uplink: DELETE /intl/usergroup/group/{groupId} then DELETE /intlSamProfile/delete/{authProfileId}
    - proxy: GET /vouchers
      uplink: GET /intlSamVoucher/getList/{tenantName}/{groupId}
    - proxy: GET /vouchers/status
      uplink: GET /intlSamVoucher/getStatus/{tenantName}/{groupId}
    - proxy: POST /vouchers/generate
      uplink: POST /intlSamVoucher/create/{tenant}/{tenant}/{groupId}
    - proxy: DELETE /vouchers/expired
      uplink: DELETE /intlSamVoucher/v2/delete
    - proxy: GET /clients/auth|unauth|suspected
      uplink: GET /open/v1/dev/user/current-user
paths:
  /login:
    post:
      tags: [Auth Core]
      summary: Root login alias (same behavior as /auth/core/login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /auth/core/login:
    post:
      tags: [Auth Core]
      summary: Login via Ruijie access token endpoint and create app session
      description: Accepts app credentials, requests upstream access token, stores session in Firebase as start/{appid}, and returns normalized auth payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /auth/core/projects:
    get:
      tags: [Auth Core]
      summary: Get projects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of projects
  /auth/core/tenant:
    get:
      tags: [Auth Core]
      summary: Get tenant details
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant details
  /vouchers:
    get:
      tags: [Vouchers]
      summary: Get vouchers
      description: Returns simplified vouchers from Ruijie intlSamVoucher list API.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: groupId
          required: true
          schema:
            type: string
          description: Network group id
        - in: query
          name: status
          required: false
          schema:
            type: integer
            enum: [1, 2, 3]
            default: 1
          description: 1 Unused, 2 Inuse, 3 Expire
        - in: query
          name: start
          required: false
          schema:
            type: integer
            default: 0
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Voucher list
  /vouchers/status:
    get:
      tags: [Vouchers]
      summary: Get voucher status summary
      description: Returns expired/total/used summary from Ruijie intlSamVoucher getStatus API. If uplink returns business error `voucherData.code=1014`, proxy responds with `409 USERGROUP_NOT_SYNCED` and clients should reset selected group/package state.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: groupId
          required: true
          schema:
            type: string
          description: Network group id
      responses:
        '200':
          description: Voucher status summary
        '409':
          description: Usergroup is not synchronized yet (mapped from uplink voucherData.code=1014)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientErrorEnvelope'
  /vouchers/generate:
    post:
      tags: [Vouchers]
      summary: Generate vouchers
      description: Creates vouchers via Ruijie intlSamVoucher/create endpoint using tenantName from session.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupId, userGroupId, profile]
              properties:
                groupId:
                  type: integer
                userGroupId:
                  type: integer
                profile:
                  type: string
                  description: authProfileId from package list
                count:
                  type: integer
                  description: Alias of quantity
                quantity:
                  type: string
                createCodeType:
                  type: string
                  default: '1'
                codeSize:
                  type: integer
                  default: 9
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                comment:
                  type: string
      responses:
        '200':
          description: Generate vouchers response
  /vouchers/expired:
    delete:
      tags: [Vouchers]
      summary: Delete expired vouchers in batches
      description: Accepts list of uuid+voucherCode rows, processes upstream deletion in chunks of 100.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: groupId
          required: true
          schema:
            type: string
          description: Network group id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [uuid, voucherCode]
                properties:
                  uuid:
                    type: string
                  voucherCode:
                    type: string
      responses:
        '200':
          description: Delete vouchers response
  /packages:
    get:
      tags: [Packages]
      summary: Get packages
      description: Returns package(usergroup) list from Ruijie intl usergroup list API using fixed upstream pagination pageIndex=1 and pageSize=20.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: groupId
          required: true
          schema:
            type: string
          description: Network group id
      responses:
        '200':
          description: Package list
  /packages/create:
    post:
      tags: [Packages]
      summary: Create package (usergroup)
      description: Creates auth profile first, then creates usergroup with returned profileId, and returns simplified package payload.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Created package
  /packages/{groupId}:
    post:
      tags: [Packages]
      summary: Update package (auth profile + usergroup)
      description: Updates auth profile first, then updates usergroup using the same payload.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: groupId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated package group
  /packages/{uuid}:
    delete:
      tags: [Packages]
      summary: Delete package (usergroup + auth profile)
      description: Deletes usergroup first, then deletes auth profile using uuid/authProfileId.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: uuid
          required: true
          schema:
            type: string
          description: authProfileId/uuid for intlSamProfile delete step
        - in: query
          name: groupId
          required: true
          schema:
            type: string
          description: Network group id
        - in: query
          name: packageId
          required: true
          schema:
            type: integer
          description: Usergroup/package id used in first delete step
        - in: query
          name: authProfileId
          required: false
          schema:
            type: string
          description: Optional override for auth profile id; defaults to path uuid
      responses:
        '200':
          description: Package deleted
  /clients/auth:
    get:
      tags: [Clients]
      summary: Get authenticated clients
      description: Filters current users where authMac is true or account is present.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: group_id
          required: true
          schema:
            type: integer
        - in: query
          name: page_index
          required: false
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Authenticated clients list
  /clients/unauth:
    get:
      tags: [Clients]
      summary: Get unauthenticated clients
      description: Filters current users where authMac is false and account is empty.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: group_id
          required: true
          schema:
            type: integer
        - in: query
          name: page_index
          required: false
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Unauthenticated clients list
  /clients/suspected:
    get:
      tags: [Clients]
      summary: Get suspected clients
      description: Filters current users where authMac and account are missing and flowUpDown exceeds 20MB.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: group_id
          required: true
          schema:
            type: integer
        - in: query
          name: page_index
          required: false
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Suspected clients list
  /network_group:
    get:
      tags: [Network Group]
      summary: Get simplified network groups
      description: Returns leaf network groups only, each item includes name and groupId.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Simplified group list
components:
  schemas:
    ClientSuccessEnvelope:
      type: object
      required:
        - success
        - message
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
          description: Always true for successful normalized client responses.
        message:
          type: string
          description: Human readable status message.
          example: OK
        data:
          description: Endpoint payload after client-side normalization.
          nullable: true
        meta:
          type: object
          description: Optional metadata such as pagination or count.
          additionalProperties: true
    ClientErrorEnvelope:
      type: object
      required:
        - success
        - message
        - error
      properties:
        success:
          type: boolean
          enum: [false]
          description: Always false for normalized client errors.
        message:
          type: string
          description: Human readable error message.
        error:
          type: object
          required:
            - httpStatus
          properties:
            httpStatus:
              type: integer
              description: HTTP status code from proxy response.
            details:
              description: Optional upstream/proxy diagnostic payload.
              nullable: true
    ProxyErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Proxy-level error message.
        details:
          description: Optional upstream error body.
          nullable: true
    LoginRequest:
      type: object
      required:
        - appid
        - secret
      properties:
        appid:
          type: string
          description: Ruijie application id
        secret:
          type: string
          description: Ruijie application secret
        ruijie_id:
          type: string
          description: Backward-compatible alias for appid
        ruijie_secret:
          type: string
          description: Backward-compatible alias for secret
    LoginResponse:
      type: object
      required:
        - appid
        - secret
        - authorization
        - access_code
      properties:
        appid:
          type: string
        secret:
          type: string
        authorization:
          type: string
          description: Bearer token used for proxy routes, format Bearer appid::access_token
        access_code:
          nullable: true
          type: string
  responses:
    ProxyError:
      description: Standard proxy error body returned on failures.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProxyErrorResponse'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: appid::token
